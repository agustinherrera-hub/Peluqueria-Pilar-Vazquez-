<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peluquería Vazquez - Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.7">
</head>
<body class="bg-gray-100">



            <!-- ===================== PANTALLA DE LOGIN ===================== -->
    <div id="pantallaLogin" class="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-cut"></i>
            </div>
            <h1 class="login-titulo">Peluquería Vazquez</h1>
            <p class="login-subtitulo">Acceso al sistema de agenda</p>

            <div id="loginError" class="login-error hidden">
                <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos
            </div>

            <div class="login-campo">
                <label>USUARIA</label>
                <div class="login-input-wrap">
                    <i class="fas fa-user"></i>
                    <select id="loginUsuario">
                        <option value="">-- Selecciona --</option>
                        <option value="Marina">Marina</option>
                        <option value="Pili">Pili</option>
                    </select>
                </div>
            </div>

            <div class="login-campo">
                <label>CONTRASEÑA</label>
                <div class="login-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') hacerLogin()">
                    <button type="button" onclick="toggleVerPass('loginPass', this)" class="ojo-btn"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <button onclick="hacerLogin()" class="btn-login">
                <i class="fas fa-sign-in-alt mr-2"></i> ENTRAR
            </button>
        </div>
    </div>

    <!-- ===================== MODAL CAMBIAR CONTRASEÑA ===================== -->
    <div id="modalCambiarPass" class="modal-overlay hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="cambiarpass-card">
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black text-gray-800"><i class="fas fa-key mr-2 text-pink-500"></i>Cambiar Contraseña</h2>
                <button onclick="cerrarCambiarPass()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <p id="cambiarPassUsuaria" class="text-sm text-pink-600 font-bold mb-4"></p>

            <div id="cambiarPassError" class="login-error hidden mb-3">
                <i class="fas fa-exclamation-circle"></i> <span id="cambiarPassErrorMsg"></span>
            </div>
            <div id="cambiarPassOk" class="login-ok hidden mb-3">
                <i class="fas fa-check-circle"></i> ¡Contraseña cambiada correctamente!
            </div>

            <div class="login-campo">
                <label>CONTRASEÑA ACTUAL</label>
                <div class="login-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passActual" placeholder="Tu contraseña actual">
                    <button type="button" onclick="toggleVerPass('passActual', this)" class="ojo-btn"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="login-campo">
                <label>NUEVA CONTRASEÑA</label>
                <div class="login-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passNueva" placeholder="Mínimo 4 caracteres">
                    <button type="button" onclick="toggleVerPass('passNueva', this)" class="ojo-btn"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="login-campo">
                <label>REPETIR NUEVA CONTRASEÑA</label>
                <div class="login-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passRepetir" placeholder="Repite la contraseña">
                    <button type="button" onclick="toggleVerPass('passRepetir', this)" class="ojo-btn"><i class="fas fa-eye"></i></button>
                </div>
            </div>

            <button onclick="guardarNuevaPass()" class="btn-login mt-4">
                <i class="fas fa-save mr-2"></i> GUARDAR CONTRASEÑA
            </button>
        </div>
    </div>
    <header class="main-header">
        <div class="header-content">
            <h1><i class="fas fa-cut"></i> Peluquería Vazquez</h1>
            <div class="flex items-center gap-3">
                <span id="indicadorRefresco" class="text-xs text-pink-200 font-bold transition-opacity duration-500 opacity-50"></span>
                <button onclick="abrirFormulario()" class="btn-nueva-cita">NUEVA CITA</button>
                <div class="user-menu">
                    <span id="nombreUsuarioActivo" class="text-white text-sm font-bold"></span>
                    <button onclick="abrirCambiarPass()" class="btn-user-action" title="Cambiar contraseña"><i class="fas fa-key"></i></button>
                    <button onclick="cerrarSesion()" class="btn-user-action" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div class="date-selector-bar bg-white p-4 rounded-2xl shadow-sm mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <input type="date" id="fechaAgenda" onchange="cambiarDia()" class="font-bold text-pink-600 outline-none">
                <span id="diaSemana" class="font-bold text-pink-400 text-sm"></span>
            </div>
            <div class="legend flex gap-4 text-xs font-bold uppercase">
                <span class="flex items-center gap-1"><span class="w-3 h-3 bg-pink-500 rounded-full"></span> Trabajadoras</span>
            </div>
        </div>

        <!-- Las columnas de agenda se generan dinámicamente desde JS -->
        <div id="agenda-grid" class="agenda-grid gap-6"></div>
    </main>

    <div id="modalCita" class="modal-overlay hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="modal-card bg-white rounded-[2.5rem] w-full max-w-lg p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-gray-800">Nueva Cita</h2>
                <button onclick="cerrarFormulario()" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
            </div>
            
            <form id="formCita" class="space-y-5">

                <div class="form-group">
                    <label class="label-mini">FECHA</label>
                    <input type="date" id="fechaCita" onchange="generarBotonesHora()" required class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-400">
                </div>

                <div class="form-group">
                    <label class="label-mini">CLIENTA / CLIENTE</label>
                    <input type="text" id="cliente" list="listaClientes" oninput="verificarNotasCliente(this.value)" placeholder="Nombre de la clienta..." required class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-pink-400">
                    <datalist id="listaClientes"></datalist>

                    <div id="telefonoCliente" class="mt-2 flex items-center justify-between p-3 bg-green-50 border-l-4 border-green-400 rounded-lg" style="display:none">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-phone text-green-500 text-xs"></i>
                            <span id="textoTelefono" class="text-sm font-bold text-green-700"></span>
                            <button type="button" onclick="editarTelefono()" class="ml-1 text-green-400 hover:text-green-600 text-xs"><i class="fas fa-pencil-alt"></i></button>
                        </div>
                        <a id="enlaceLlamar" href="#" class="flex items-center gap-1 bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition">
                            <i class="fas fa-phone-alt"></i> Llamar
                        </a>
                    </div>
                    <div id="editarTelefonoDiv" style="display:none" class="mt-2 flex items-center gap-2">
                        <input type="tel" id="inputNuevoTelefono" placeholder="Nuevo teléfono..." class="flex-1 p-2 bg-gray-50 rounded-xl border border-gray-200 text-sm font-bold outline-none focus:border-pink-400">
                        <button type="button" onclick="guardarTelefono()" class="bg-pink-500 text-white text-xs font-bold px-3 py-2 rounded-xl hover:bg-pink-600 transition">Guardar</button>
                        <button type="button" onclick="cancelarEditarTelefono()" class="bg-gray-100 text-gray-500 text-xs font-bold px-3 py-2 rounded-xl hover:bg-gray-200 transition">✕</button>
                    </div>
                    <div id="proteccionDatos" style="display:none" class="mt-2 p-3 bg-blue-50 border-l-4 border-blue-400 rounded-lg">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="checkRGPD" class="w-4 h-4 accent-pink-500">
                            <span class="text-xs font-bold text-blue-700">RGPD — Clienta informada y conforme con la política de protección de datos</span>
                        </label>
                        <p id="rgpdEstado" class="hidden mt-1 text-xs text-green-600 font-bold"><i class="fas fa-check-circle mr-1"></i>Firmado</p>
                    </div>
                    
                    <div id="avisoNotas" class="hidden mt-2 p-3 bg-yellow-50 border-l-4 border-yellow-400 rounded-lg">
                        <p class="text-xs text-yellow-700 font-bold uppercase"><i class="fas fa-exclamation-triangle mr-1"></i> Notas importantes:</p>
                        <p id="textoNotas" class="text-sm text-yellow-800 italic"></p>
                    </div>

                    <div id="historialClientaForm" class="hidden mt-2 p-3 bg-purple-50 border-l-4 border-purple-400 rounded-lg">
                    </div>

                    <div id="proximasCitasForm" class="mt-2 p-3 bg-blue-50 border-l-4 border-blue-400 rounded-lg" style="display:none">
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-mini">SERVICIOS A REALIZAR</label>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Categoría:</label>
                        <select id="selectCategoria" onchange="filtrarServiciosPorCategoria()" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm font-bold text-gray-700 mb-3">
                            <option value="">-- Selecciona categoría --</option>
                        </select>
                        <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 mb-2 focus-within:border-pink-400 transition">
                            <i class="fas fa-search text-pink-400 text-sm flex-shrink-0"></i>
                            <input type="text" id="buscadorServicios" oninput="buscarServicio()" placeholder="Buscar servicio..." class="flex-1 bg-transparent border-none outline-none text-sm text-gray-700 font-medium placeholder-gray-400">
                        </div>
                        <div id="contenedorServicios" class="grid grid-cols-1 gap-2 overflow-y-auto p-2 border border-gray-100 rounded-xl bg-gray-50" style="height: 300px;"></div>
                        <div class="mt-4 p-3 bg-pink-50 rounded-xl flex justify-between items-center">
                            <span class="text-xs font-bold text-pink-600 uppercase">Tiempo selección:</span>
                            <span id="labelDuracion" class="text-lg font-black text-pink-600">0 min</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label-mini">TRABAJADORA</label>
                    <!-- Los botones de trabajadora se generan dinámicamente desde JS -->
                    <div id="contenedorBotonesTrabajadora" class="grid grid-cols-2 gap-3 mt-1">
                        <!-- generado por generarBotonesTrabajadora() -->
                    </div>
                    <input type="hidden" id="areaNegocio">
                    <input type="hidden" id="trabajadora">
                </div>

                <div class="form-group">
                    <label class="label-mini">HORA DE INICIO</label>
                    <p id="avisoHorasDuracion" class="text-xs text-pink-500 font-bold mb-2" style="display:none">
                        <i class="fas fa-clock mr-1"></i>Solo se muestran horas con <span id="textoMinDuracion"></span> min libres seguidos
                    </p>
                    <div id="gridHorasSeleccion" class="grid grid-cols-4 gap-2 p-3 bg-gray-50 rounded-2xl border border-gray-100 max-h-40 overflow-y-auto"></div>
                    <input type="hidden" id="horaSeleccionada" required>
                </div>

                <div class="form-group">
                    <button type="button" onclick="confirmarServicios()" class="w-full bg-purple-500 hover:bg-purple-600 text-white p-3 rounded-2xl font-black text-sm transition shadow">
                        <i class="fas fa-check mr-2"></i>CONFIRMAR SERVICIOS
                    </button>
                </div>

                <!-- Resumen de bloques confirmados -->
                <div id="resumenBloques" style="display:none" class="p-3 bg-pink-50 border border-pink-200 rounded-2xl text-sm"></div>

                <div class="form-actions flex gap-4 mt-6">
                    <button type="button" onclick="cerrarFormulario()" class="flex-1 bg-gray-100 text-gray-600 p-4 rounded-2xl font-bold hover:bg-gray-200 transition">
                        <i class="fas fa-arrow-left mr-2"></i>VOLVER
                    </button>
                    <button type="submit" id="btnGuardar" class="flex-[2] bg-pink-500 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-pink-600 transition">
                        <i class="fas fa-save mr-2"></i>GUARDAR CITA
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
